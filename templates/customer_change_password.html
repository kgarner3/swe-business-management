<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Change Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Change Customer Password</h1>

        <form id="customerChangePasswordForm">
            <label for="customerNewPassword">New Password</label>
            <input type="password" id="customerNewPassword" name="customerNewPassword" required>

            <label for="customerConfirmPassword">Confirm New Password</label>
            <input type="password" id="customerConfirmPassword" name="customerConfirmPassword" required>

            <button type="submit">Update Password</button>
        </form>

        <p id="customerChangePasswordMessage"></p>

        <button type="button" onclick="goHome()">Back to Home</button>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
