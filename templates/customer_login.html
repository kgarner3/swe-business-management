<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Customer Login</h1>

        <form id="customerLoginForm">
            <label for="customerUsername">Username</label>
            <input type="text" id="customerUsername" name="customerUsername" required>

            <label for="customerPassword">Password</label>
            <input type="password" id="customerPassword" name="customerPassword" required>

            <button type="submit">Log In</button>
        </form>

        <p id="customerLoginMessage"></p>

        <button type="button" onclick="goHome()">Back to Home</button>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
